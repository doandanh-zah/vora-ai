<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORA Ambassador - Real-time Voice AI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .config-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        input, select, button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        
        button {
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            text-align: center;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            font-weight: bold;
        }
        
        .status.idle { background: rgba(255, 255, 255, 0.2); }
        .status.listening { background: rgba(255, 193, 7, 0.3); animation: pulse 1.5s infinite; }
        .status.processing { background: rgba(23, 162, 184, 0.3); }
        .status.speaking { background: rgba(76, 175, 80, 0.3); }
        .status.error { background: rgba(244, 67, 54, 0.3); }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .transcript {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
        }
        
        .message.user { background: rgba(33, 150, 243, 0.2); }
        .message.ai { background: rgba(76, 175, 80, 0.2); }
        .message.system { background: rgba(255, 152, 0, 0.2); }
        
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #2196F3;
        }
        
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ VORA Ambassador - Real-time Voice AI</h1>
        
        <div class="config-section">
            <h3>🔑 API Configuration</h3>
            <div class="settings-grid">
                <div class="input-group">
                    <label for="agoraAppId">Agora App ID:</label>
                    <input type="text" id="agoraAppId" placeholder="Enter Agora App ID">
                </div>
                
                <div class="input-group">
                    <label for="agoraToken">Agora Token:</label>
                    <input type="text" id="agoraToken" placeholder="Enter Agora Token (optional)">
                </div>
                
                <div class="input-group">
                    <label for="humeApiKey">Hume API Key:</label>
                    <input type="password" id="humeApiKey" placeholder="Enter Hume API Key">
                </div>
                
                <div class="input-group">
                    <label for="groqApiKey">Groq API Key:</label>
                    <input type="password" id="groqApiKey" placeholder="Enter Groq API Key">
                </div>
            </div>
            
            <div class="settings-grid">
                <div class="input-group">
                    <label for="voiceSelect">🎤 Hume Voice:</label>
                    <select id="voiceSelect">
                        <option value="">🎯 Use Browser TTS (Free)</option>
                        <optgroup label="⭐ Hume Octave Voices">
                            <option value="9e068547-5ba4-4c8e-8e03-69282a008f04" selected>Emma (Natural Female)</option>
                            <option value="c2d5b5a5-b447-4c8e-8e03-69282a008f05">James (Casual Male)</option>
                            <option value="d6e8c5a5-c447-4c8e-8e03-69282a008f06">Sophia (Warm Female)</option>
                            <option value="e7f9c5a5-d447-4c8e-8e03-69282a008f07">Daniel (Professional Male)</option>
                        </optgroup>
                    </select>
                </div>
                
                <div class="input-group">
                    <label for="modelSelect">🧠 AI Model:</label>
                    <select id="modelSelect">
                        <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
                        <option value="llama-3.1-70b-versatile">Llama 3.1 70B (Smart)</option>
                        <option value="mixtral-8x7b-32768">Mixtral 8x7B (Balanced)</option>
                        <option value="gemma2-9b-it">Gemma 2 9B (Lightweight)</option>
                    </select>
                </div>
            </div>
            
            <div class="settings-grid">
                <div class="input-group">
                    <div class="toggle-switch">
                        <span>🎯 Use Agora STT</span>
                        <label class="switch">
                            <input type="checkbox" id="useAgoraSTT">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                
                <div class="input-group">
                    <div class="toggle-switch">
                        <span>🔊 Use Hume TTS</span>
                        <label class="switch">
                            <input type="checkbox" id="useHumeTTS">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="status idle" id="status">
            🎤 Ready - Click Start to begin conversation
        </div>
        
        <div style="text-align: center; margin: 20px 0;">
            <button id="startBtn" onclick="startConversation()">🚀 Start Conversation</button>
            <button id="stopBtn" onclick="stopConversation()" disabled>⏹️ Stop</button>
        </div>
        
        <div class="transcript" id="transcript">
            <div class="message system">🎙️ VORA Ambassador Demo! Note: Agora STT may have issues in some environments. Browser STT will be used as fallback. Configure your APIs and click Start to begin.</div>
        </div>
    </div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js?v=4.20.1"></script>
    <script>
        console.log('=== VORA AMBASSADOR DEMO - FINAL VERSION LOADING ===');
        
        // Global variables
        let client = null;
        let localAudioTrack = null;
        let remoteAudioTrack = null;
        let isListening = false;
        let conversationActive = false;
        
        // Load saved settings
        window.addEventListener('DOMContentLoaded', () => {
            console.log('=== DOM LOADED ===');
            loadSettings();
        });
        
        function loadSettings() {
            document.getElementById('agoraAppId').value = localStorage.getItem('agora_app_id') || '';
            document.getElementById('humeApiKey').value = localStorage.getItem('hume_api_key') || '';
            document.getElementById('groqApiKey').value = localStorage.getItem('groq_api_key') || '';
            document.getElementById('useAgoraSTT').checked = localStorage.getItem('use_agora_stt') === 'true';
            document.getElementById('useHumeTTS').checked = localStorage.getItem('use_hume_tts') === 'true';
        }
        
        function saveSettings() {
            localStorage.setItem('agora_app_id', document.getElementById('agoraAppId').value);
            localStorage.setItem('hume_api_key', document.getElementById('humeApiKey').value);
            localStorage.setItem('groq_api_key', document.getElementById('groqApiKey').value);
            localStorage.setItem('use_agora_stt', document.getElementById('useAgoraSTT').checked);
            localStorage.setItem('use_hume_tts', document.getElementById('useHumeTTS').checked);
        }
        
        async function startConversation() {
            try {
                console.log('=== STARTING CONVERSATION ===');
                saveSettings();
                
                const appId = document.getElementById('agoraAppId').value.trim();
                const token = document.getElementById('agoraToken').value.trim();
                const useAgoraSTT = document.getElementById('useAgoraSTT').checked;
                
                console.log('App ID:', appId);
                console.log('Token:', token ? 'provided' : 'not provided');
                console.log('Use Agora STT:', useAgoraSTT);
                
                if (!appId) {
                    addMessage('Please enter Agora App ID', 'system');
                    return;
                }
                
                if (useAgoraSTT) {
                    try {
                        await initializeAgora(appId, token);
                    } catch (error) {
                        console.error('Agora failed, falling back to browser STT:', error);
                        addMessage(`Agora STT failed: ${error.message}. Falling back to browser STT.`, 'system');
                        startBrowserSTT();
                    }
                } else {
                    startBrowserSTT();
                }
                
                conversationActive = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                updateStatus('🎙️ Listening...', 'listening');
                
            } catch (error) {
                console.error('Start conversation error:', error);
                addMessage(`Failed to start: ${error.message}`, 'system');
                updateStatus('❌ Error', 'error');
            }
        }
        
        async function initializeAgora(appId, token) {
            console.log('=== INITIALIZING AGORA ===');
            addMessage('Initializing Agora RTC...', 'system');
            
            // Debug Agora SDK version and capabilities
            console.log('Agora SDK version:', AgoraRTC.VERSION);
            console.log('Agora SDK methods:', Object.keys(AgoraRTC));
            console.log('Browser user agent:', navigator.userAgent);
            console.log('Browser supports WebRTC:', !!navigator.mediaDevices);
            
            try {
                client = AgoraRTC.createClient({ codec: "vp8", mode: "rtc" });
                console.log('Agora client created:', client);
                console.log('Client methods:', Object.getOwnPropertyNames(client));
                
                client.on("user-published", async (user, mediaType) => {
                    addMessage(`User ${user.uid} published`, 'system');
                    await client.subscribe(user, mediaType);
                    if (mediaType === "audio") {
                        remoteAudioTrack = user.audioTrack;
                        remoteAudioTrack.play();
                    }
                });
                
                client.on("user-unpublished", (user) => {
                    addMessage(`User ${user.uid} unpublished`, 'system');
                });
                
                // FINAL FIX: Use simple hardcoded channel name
                const channelName = "vora-ambassador-final";
                
                console.log('=== AGORA JOIN DEBUG ===');
                console.log('Using hardcoded channel name:', channelName);
                console.log('Channel name length:', channelName.length);
                console.log('Channel name type:', typeof channelName);
                console.log('App ID type:', typeof appId);
                console.log('App ID length:', appId.length);
                console.log('Token type:', typeof token);
                console.log('Token length:', token ? token.length : 0);
                
                addMessage(`Joining channel: ${channelName}`, 'system');
                
                // Test basic Agora connectivity
                console.log('Testing Agora connectivity...');
                
                const uid = await client.join(appId, null, channelName);
                console.log('JOIN SUCCESS - UID:', uid);
                addMessage(`Joined Agora channel "${channelName}" with UID: ${uid}`, 'system');
                
                // Create local audio track for recording
                console.log('Creating microphone track...');
                localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                console.log('Microphone track created:', localAudioTrack);
                
                console.log('Publishing local track...');
                await client.publish(localAudioTrack);
                console.log('Local track published successfully');
                
                addMessage('Agora STT initialized successfully', 'system');
                
            } catch (error) {
                console.error('=== AGORA INITIALIZATION FAILED ===');
                console.error('Error type:', error.constructor.name);
                console.error('Error message:', error.message);
                console.error('Error stack:', error.stack);
                throw error;
            }
        }
        
        function startBrowserSTT() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                addMessage('Speech recognition not supported in this browser', 'system');
                return;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';
            
            recognition.onresult = (event) => {
                const last = event.results.length - 1;
                const transcript = event.results[last][0].transcript;
                
                if (event.results[last].isFinal) {
                    processUserInput(transcript);
                }
            };
            
            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                addMessage(`Speech recognition error: ${event.error}`, 'system');
                
                // Restart recognition if aborted (common issue)
                if (event.error === 'aborted' && isListening) {
                    console.log('Restarting speech recognition after abort...');
                    setTimeout(() => {
                        if (isListening) {
                            recognition.start();
                        }
                    }, 1000);
                }
            };
            
            recognition.start();
            isListening = true;
            addMessage('Browser STT started', 'system');
        }
        
        async function processUserInput(text) {
            addMessage(text, 'user');
            updateStatus('🤔 Processing...', 'processing');
            
            try {
                const response = await sendToGroq(text);
                if (response) {
                    addMessage(response, 'ai');
                    await speakResponse(response);
                }
            } catch (error) {
                console.error('Processing error:', error);
                addMessage(`Processing failed: ${error.message}`, 'system');
            }
            
            if (conversationActive) {
                updateStatus('🎙️ Listening...', 'listening');
            }
        }
        
        async function sendToGroq(message) {
            const apiKey = document.getElementById('groqApiKey').value.trim();
            const model = document.getElementById('modelSelect').value;
            
            console.log('=== GROQ API DEBUG ===');
            console.log('API Key exists:', !!apiKey);
            console.log('API Key length:', apiKey ? apiKey.length : 0);
            console.log('Model:', model);
            console.log('Message:', message);
            
            if (!apiKey) {
                addMessage('Please configure Groq API key', 'system');
                return null;
            }
            
            const requestBody = {
                model: model,
                messages: [
                    {
                        role: 'system',
                        content: 'You are VORA, a helpful AI assistant. Be concise and natural. Use short sentences. Answer directly without formal openings. Use contractions. Sound like you\'re talking, not writing. Keep responses under 2-3 sentences.'
                    },
                    {
                        role: 'user',
                        content: message
                    }
                ],
                max_tokens: 100,
                temperature: 0.9
            };
            
            console.log('Request body:', JSON.stringify(requestBody, null, 2));
            
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(requestBody)
            });
            
            console.log('Groq response status:', response.status);
            console.log('Groq response headers:', response.headers);
            
            if (!response.ok) {
                const errorText = await response.text();
                console.error('Groq error response:', errorText);
                throw new Error(`Groq API error: ${response.status} - ${errorText}`);
            }
            
            const data = await response.json();
            console.log('Groq response data:', data);
            return data.choices[0].message.content;
        }
        
        async function speakResponse(text) {
            const useHume = document.getElementById('useHumeTTS').checked;
            const humeKey = document.getElementById('humeApiKey').value.trim();
            const voiceId = document.getElementById('voiceSelect').value;
            
            updateStatus('🔊 Speaking...', 'speaking');
            
            if (useHume && humeKey && voiceId) {
                await speakWithHume(text, humeKey, voiceId);
            } else {
                speakWithBrowserTTS(text);
            }
        }
        
        async function speakWithHume(text, apiKey, voiceId) {
            try {
                const requestBody = {
                    utterances: [{
                        text: text,
                        voice: { id: voiceId },
                        speed: 1.0
                    }],
                    format: { type: 'mp3' }
                };
                
                const response = await fetch('https://api.hume.ai/v0/tts/file', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Hume-Api-Key': apiKey,
                    },
                    body: JSON.stringify(requestBody)
                });
                
                if (!response.ok) {
                    throw new Error(`Hume API error: ${response.status}`);
                }
                
                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                
                audio.onended = () => {
                    URL.revokeObjectURL(audioUrl);
                    if (conversationActive) {
                        updateStatus('🎙️ Listening...', 'listening');
                    }
                };
                
                await audio.play();
                
            } catch (error) {
                console.error('Hume TTS error:', error);
                addMessage(`Hume TTS failed: ${error.message}`, 'system');
                speakWithBrowserTTS(text);
            }
        }
        
        function speakWithBrowserTTS(text) {
            if (!('speechSynthesis' in window)) {
                addMessage('Speech synthesis not supported', 'system');
                return;
            }
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            
            utterance.onend = () => {
                if (conversationActive) {
                    updateStatus('🎙️ Listening...', 'listening');
                }
            };
            
            window.speechSynthesis.speak(utterance);
        }
        
        function stopConversation() {
            conversationActive = false;
            
            if (client) {
                client.leave();
                client = null;
            }
            
            if (localAudioTrack) {
                localAudioTrack.close();
                localAudioTrack = null;
            }
            
            if (remoteAudioTrack) {
                remoteAudioTrack.stop();
                remoteAudioTrack = null;
            }
            
            isListening = false;
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            updateStatus('⏹️ Stopped', 'idle');
            addMessage('Conversation stopped', 'system');
        }
        
        function addMessage(text, type) {
            const transcript = document.getElementById('transcript');
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
            transcript.appendChild(message);
            transcript.scrollTop = transcript.scrollHeight;
        }
        
        function updateStatus(text, className) {
            const status = document.getElementById('status');
            status.textContent = text;
            status.className = `status ${className}`;
        }
    </script>
</body>
</html>
